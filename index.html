<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正在跳转 - 智慧校园查寝系统</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <style>
        /* 样式部分保持不变，与之前相同，此处省略以节省篇幅，实际使用时复制原有样式 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; color: #fff; overflow: hidden; }
        body::before { content: ''; position: absolute; width: 200%; height: 200%; background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px); background-size: 50px 50px; animation: backgroundMove 20s linear infinite; z-index: -1; }
        @keyframes backgroundMove { 0% { transform: translate(0, 0); } 100% { transform: translate(50px, 50px); } }
        .container { text-align: center; padding: 40px; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border-radius: 20px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2); border: 1px solid rgba(255, 255, 255, 0.2); max-width: 400px; width: 90%; animation: containerFadeIn 0.8s ease-out; }
        @keyframes containerFadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .spinner { width: 60px; height: 60px; margin: 0 auto 25px; border: 4px solid rgba(255, 255, 255, 0.2); border-top-color: #fff; border-radius: 50%; animation: spin 1s linear infinite; position: relative; }
        .spinner::before { content: ''; position: absolute; top: 5px; left: 5px; right: 5px; bottom: 5px; border: 3px solid rgba(255, 255, 255, 0.3); border-top-color: transparent; border-radius: 50%; animation: spin 2s linear infinite reverse; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .message { font-size: 22px; font-weight: 600; margin-bottom: 12px; text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2); animation: textFadeIn 0.6s ease-out 0.2s both; }
        @keyframes textFadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .hint { font-size: 14px; opacity: 0.85; line-height: 1.6; animation: textFadeIn 0.6s ease-out 0.4s both; }
        .ip-display { margin-top: 20px; padding: 12px; background: rgba(255, 255, 255, 0.15); border-radius: 10px; font-family: 'Courier New', monospace; font-size: 13px; animation: textFadeIn 0.6s ease-out 0.6s both; }
        .ip-label { font-size: 12px; opacity: 0.8; margin-bottom: 5px; }
        .ip-value { font-weight: bold; font-size: 15px; }
        .retry-btn { margin-top: 25px; padding: 12px 35px; background: #fff; color: #667eea; border: none; border-radius: 25px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2); animation: buttonFadeIn 0.6s ease-out 0.8s both; outline: none; }
        .retry-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3); }
        .retry-btn:active { transform: translateY(0); }
        @keyframes buttonFadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .error-icon { font-size: 50px; margin-bottom: 20px; animation: shake 0.6s ease-out; display: block; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 15% { transform: translateX(-15px); } 30% { transform: translateX(15px); } 45% { transform: translateX(-15px); } 60% { transform: translateX(15px); } 75% { transform: translateX(-10px); } }
        .success-icon { font-size: 50px; margin-bottom: 20px; animation: bounce 0.8s ease-out; display: block; }
        @keyframes bounce { 0%, 100% { transform: scale(0); } 50% { transform: scale(1.2); } 70% { transform: scale(0.9); } 85% { transform: scale(1.1); } }
        .progress-bar { width: 100%; height: 4px; background: rgba(255, 255, 255, 0.2); border-radius: 2px; margin-top: 20px; overflow: hidden; animation: fadeIn 0.6s ease-out 0.5s both; }
        .progress-bar::after { content: ''; display: block; width: 50%; height: 100%; background: #fff; animation: progress 1.5s ease-in-out infinite; }
        @keyframes progress { 0% { transform: translateX(-100%); } 100% { transform: translateX(200%); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .hidden { display: none !important; }
        @media (max-width: 480px) { .container { padding: 30px 20px; } .message { font-size: 18px; } .hint { font-size: 13px; } .spinner { width: 50px; height: 50px; } }
        .error-steps { text-align: left; background: rgba(0,0,0,0.2); border-radius: 12px; padding: 12px 16px; margin-top: 12px; font-size: 12px; }
        .error-steps li { margin: 8px 0; list-style: none; display: flex; align-items: center; gap: 8px; }
        .error-steps li::before { content: "•"; font-size: 16px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div id="loading-state">
            <div class="spinner"></div>
            <div class="message">正在检测网络环境...</div>
            <div class="hint">请稍候，正在验证校园网连接</div>
            <div class="progress-bar"></div>
            <div style="margin-top: 15px; font-size: 11px; opacity: 0.6;">版本：v4.0 | 更新时间：2026-04-22</div>
        </div>
        <div id="success-state" class="hidden">
            <div class="success-icon">✅</div>
            <div class="message">检测成功！</div>
            <div class="hint">正在跳转到查寝系统...</div>
            <div class="ip-display"><div class="ip-label">系统地址</div><div class="ip-value" id="success-ip">--</div></div>
        </div>
        <div id="error-state" class="hidden">
            <div class="error-icon">⚠️</div>
            <div class="message">无法访问系统</div>
            <div class="hint" id="error-hint">未检测到校园网连接</div>
            <div class="error-steps" id="error-steps"></div>
            <button class="retry-btn" onclick="retry()">重新检测</button>
        </div>
    </div>

    <script>
        const CONFIG = { timeout: 4000, cacheBust: true };
        let currentIP = null;

        function showState(state) {
            ['loading', 'success', 'error'].forEach(s => {
                document.getElementById(`${s}-state`).classList.add('hidden');
            });
            document.getElementById(`${state}-state`).classList.remove('hidden');
        }

        async function fetchIP() {
            try {
                const cacheParam = CONFIG.cacheBust ? `?t=${Date.now()}` : '';
                const response = await fetch(`current_ip.txt${cacheParam}`, { cache: 'no-cache' });
                if (!response.ok) throw new Error('无法读取 IP 文件');
                const ip = (await response.text()).trim();
                if (!ip) throw new Error('IP 地址为空');
                return ip;
            } catch (error) {
                console.error('读取 IP 失败:', error);
                throw error;
            }
        }

        // 获取客户端所有本地 IP（通过 WebRTC）
        async function getLocalIPs() {
            return new Promise((resolve) => {
                const ips = new Set();

                const pc = new RTCPeerConnection({
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' }
                    ]
                });

                let done = false;
                const timeoutId = setTimeout(() => {
                    if (!done) {
                        done = true;
                        pc.close();
                        resolve(Array.from(ips));
                    }
                }, 3000);

                // 方法1：通过 onicecandidate 获取 host 候选
                pc.onicecandidate = (event) => {
                    if (done) return;
                    if (!event.candidate) return;

                    const candidate = event.candidate.candidate;
                    console.log('[WebRTC] 候选:', candidate.substring(0, 100));

                    // 检查是否为 host 类型
                    if (candidate.includes('typ host')) {
                        const ipRegex = /([0-9]{1,3}\.){3}[0-9]{1,3}/;
                        const match = candidate.match(ipRegex);
                        if (match) {
                            ips.add(match[0]);
                            console.log('[WebRTC] 添加 host IP:', match[0]);
                        }
                    }
                };

                // 方法2：监听 ICE 收集状态
                pc.onicegatheringstatechange = () => {
                    console.log('[WebRTC] 收集状态:', pc.iceGatheringState);
                    if (pc.iceGatheringState === 'complete' && !done) {
                        done = true;
                        clearTimeout(timeoutId);
                        pc.close();
                        resolve(Array.from(ips));
                    }
                };

                // 创建数据通道触发候选收集
                pc.createDataChannel('test');
                pc.createOffer()
                    .then(offer => pc.setLocalDescription(offer))
                    .catch(e => console.warn('WebRTC offer 失败', e));

                // 方法3：1秒后通过 getStats 获取
                setTimeout(async () => {
                    if (done) return;
                    try {
                        const stats = await pc.getStats();
                        stats.forEach(report => {
                            if (report.type === 'local-candidate') {
                                console.log('[WebRTC Stats] 本地候选:', report);
                                if (report.address && report.address.startsWith('10.80.')) {
                                    ips.add(report.address);
                                    console.log('[WebRTC Stats] 添加 IP:', report.address);
                                }
                            }
                        });
                    } catch (e) {
                        console.warn('[WebRTC] getStats 失败:', e);
                    }

                    if (!done) {
                        done = true;
                        clearTimeout(timeoutId);
                        pc.close();
                        resolve(Array.from(ips));
                    }
                }, 1500);
            });
        }

        // 判断是否为校园网 IP（10.80.x.x 网段）
        function isCampusNetworkIP(ip) {
            const parts = ip.split('.').map(Number);
            if (parts.length !== 4) return false;
            // 只检测 10.80.x.x 网段
            return parts[0] === 10 && parts[1] === 80;
        }

        // 检测是否在校园网（通过本地 IP 是否为 10.80 网段）
        async function detectCampusNetwork() {
            try {
                const ips = await getLocalIPs();
                console.log('[检测] 获取到本地IP:', ips);
                // 只检测 10.80 网段
                const hasCampusIP = ips.some(ip => isCampusNetworkIP(ip));
                console.log('[检测] 是否在校园网 (10.80.x.x):', hasCampusIP);
                return hasCampusIP;
            } catch (err) {
                console.warn('[检测] WebRTC 失败', err);
                return false;
            }
        }

        function redirectToSystem(ip) {
            document.getElementById('success-ip').textContent = `http://${ip}`;
            showState('success');
            setTimeout(() => {
                window.location.replace(`http://${ip}?t=${Date.now()}`);
            }, 1500);
        }

        function showError(message, detailedStepsHtml) {
            document.getElementById('error-hint').innerHTML = message;
            const stepsDiv = document.getElementById('error-steps');
            if (detailedStepsHtml) {
                stepsDiv.innerHTML = detailedStepsHtml;
                stepsDiv.classList.remove('hidden');
            } else {
                stepsDiv.classList.add('hidden');
            }
            showState('error');
        }

        async function init() {
            try {
                // 1. 读取动态 IP
                const ip = await fetchIP();
                currentIP = ip;
                console.log('读取到目标IP:', ip);

                // 2. 检测客户端是否在校园网（私有IP）
                const isInCampus = await detectCampusNetwork();
                console.log('是否在校园网:', isInCampus);

                if (isInCampus) {
                    // 3. 跳转
                    redirectToSystem(ip);
                } else {
                    showError(
                        '❌ 未检测到校园网连接',
                        `
                        <ul style="list-style:none; padding-left:0;">
                            <li>📶 请连接校园网 WiFi（如：iSichuan、eduroam、CMCC-EDU 等）</li>
                            <li>🔑 打开浏览器访问任意网站，完成校园网认证（输入学号/密码）</li>
                            <li>📱 请暂时关闭手机移动数据（流量），只保留 WiFi 连接</li>
                            <li>🔄 完成上述步骤后，点击下方“重新检测”按钮</li>
                            <li>💡 提示：部分校园网需要每天重新认证一次</li>
                        </ul>
                        `
                    );
                }
            } catch (error) {
                console.error('初始化失败:', error);
                let errMsg = '❌ 系统配置加载失败';
                let steps = '';
                if (error.message.includes('IP 地址为空')) {
                    errMsg = '❌ 服务器地址配置缺失';
                    steps = '<ul><li>⏳ 可能是管理员正在更新配置，请稍后重试</li><li>📞 若长时间无法解决，请联系管理员</li></ul>';
                } else if (error.message.includes('无法读取 IP 文件')) {
                    errMsg = '❌ 无法获取服务器地址';
                    steps = '<ul><li>🌐 请检查你的网络连接是否正常</li><li>🔄 尝试刷新页面或点击下方“重新检测”</li></ul>';
                } else {
                    errMsg = '❌ 网络环境检测失败';
                    steps = '<ul><li>📶 请确认已连接校园网 WiFi 并完成认证</li><li>📱 关闭手机流量，仅使用 WiFi</li><li>🔄 点击下方按钮重试</li></ul>';
                }
                showError(errMsg, steps);
            }
        }

        function retry() {
            showState('loading');
            document.querySelector('#loading-state .message').textContent = '正在检测网络环境...';
            document.querySelector('#loading-state .hint').textContent = '请稍候，正在验证校园网连接';
            init();
        }

        document.addEventListener('DOMContentLoaded', init);
        history.pushState(null, null, location.href);
        window.onpopstate = function() { history.pushState(null, null, location.href); };
    </script>
</body>
</html>
