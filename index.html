<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正在跳转 - 智慧校园查寝系统</title>
    <!-- 禁用缓存，确保每次都重新加载最新 IP -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            overflow: hidden;
        }
        
        /* 背景动画 */
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: backgroundMove 20s linear infinite;
            z-index: -1;
        }
        
        @keyframes backgroundMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }
        
        .container {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 400px;
            width: 90%;
            animation: containerFadeIn 0.8s ease-out;
        }
        
        @keyframes containerFadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* 加载动画 */
        .spinner {
            width: 60px;
            height: 60px;
            margin: 0 auto 25px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            position: relative;
        }
        
        .spinner::before {
            content: '';
            position: absolute;
            top: 5px;
            left: 5px;
            right: 5px;
            bottom: 5px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 2s linear infinite reverse;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .message {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 12px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
            animation: textFadeIn 0.6s ease-out 0.2s both;
        }
        
        @keyframes textFadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .hint {
            font-size: 14px;
            opacity: 0.85;
            line-height: 1.6;
            animation: textFadeIn 0.6s ease-out 0.4s both;
        }
        
        .ip-display {
            margin-top: 20px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            animation: textFadeIn 0.6s ease-out 0.6s both;
        }
        
        .ip-label {
            font-size: 12px;
            opacity: 0.8;
            margin-bottom: 5px;
        }
        
        .ip-value {
            font-weight: bold;
            font-size: 15px;
        }
        
        /* 按钮样式 */
        .retry-btn {
            margin-top: 25px;
            padding: 12px 35px;
            background: #fff;
            color: #667eea;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            animation: buttonFadeIn 0.6s ease-out 0.8s both;
            outline: none;
        }
        
        .retry-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }
        
        .retry-btn:active {
            transform: translateY(0);
        }
        
        @keyframes buttonFadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* 错误状态 */
        .error-icon {
            font-size: 50px;
            margin-bottom: 20px;
            animation: shake 0.6s ease-out;
            display: block;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            15% { transform: translateX(-15px); }
            30% { transform: translateX(15px); }
            45% { transform: translateX(-15px); }
            60% { transform: translateX(15px); }
            75% { transform: translateX(-10px); }
        }
        
        .success-icon {
            font-size: 50px;
            margin-bottom: 20px;
            animation: bounce 0.8s ease-out;
            display: block;
        }
        
        @keyframes bounce {
            0%, 100% { transform: scale(0); }
            50% { transform: scale(1.2); }
            70% { transform: scale(0.9); }
            85% { transform: scale(1.1); }
        }
        
        /* 进度条 */
        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            margin-top: 20px;
            overflow: hidden;
            animation: fadeIn 0.6s ease-out 0.5s both;
        }
        
        .progress-bar::after {
            content: '';
            display: block;
            width: 50%;
            height: 100%;
            background: #fff;
            animation: progress 1.5s ease-in-out infinite;
        }
        
        @keyframes progress {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(200%); }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        /* 隐藏类 */
        .hidden {
            display: none !important;
        }
        
        /* 响应式设计 */
        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }
            
            .message {
                font-size: 18px;
            }
            
            .hint {
                font-size: 13px;
            }
            
            .spinner {
                width: 50px;
                height: 50px;
            }
        }
        
        /* 错误详情列表样式 */
        .error-steps {
            text-align: left;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            padding: 12px 16px;
            margin-top: 12px;
            font-size: 12px;
        }
        .error-steps li {
            margin: 8px 0;
            list-style: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .error-steps li::before {
            content: "•";
            font-size: 16px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <!-- 加载状态 -->
        <div id="loading-state">
            <div class="spinner"></div>
            <div class="message">正在检测网络环境...</div>
            <div class="hint">请稍候，正在尝试连接校园网验证服务器</div>
            <div class="progress-bar"></div>
            <div style="margin-top: 15px; font-size: 11px; opacity: 0.6;">
                版本：v3.1 | 更新时间：2026-04-22
            </div>
        </div>
        
        <!-- 成功状态 -->
        <div id="success-state" class="hidden">
            <div class="success-icon">✅</div>
            <div class="message">检测成功！</div>
            <div class="hint">正在跳转到查寝系统...</div>
            <div class="ip-display">
                <div class="ip-label">系统地址</div>
                <div class="ip-value" id="success-ip">--</div>
            </div>
        </div>
        
        <!-- 错误状态 -->
        <div id="error-state" class="hidden">
            <div class="error-icon">⚠️</div>
            <div class="message">无法访问系统</div>
            <div class="hint" id="error-hint">
                未检测到校园网连接
            </div>
            <div class="error-steps" id="error-steps">
                <!-- 动态填充建议步骤 -->
            </div>
            <button class="retry-btn" onclick="retry()">重新检测</button>
        </div>
    </div>
    
    <script>
        // 配置
        const CONFIG = {
            timeout: 4000,  // 超时时间（毫秒），增加到4秒更稳定
            cacheBust: true,  // 是否禁用缓存
            useImageDetection: true  // 使用 Image 对象检测（避免 HTTPS 混合内容问题）
        };
        
        // 状态管理
        let currentState = 'loading';
        let currentIP = null;
        
        // 显示指定状态
        function showState(state) {
            const states = ['loading', 'success', 'error'];
            states.forEach(s => {
                document.getElementById(`${s}-state`).classList.add('hidden');
            });
            document.getElementById(`${state}-state`).classList.remove('hidden');
            currentState = state;
        }
        
        // 读取 IP
        async function fetchIP() {
            try {
                const cacheParam = CONFIG.cacheBust ? `?t=${Date.now()}` : '';
                const response = await fetch(`current_ip.txt${cacheParam}`, {
                    cache: 'no-cache'
                });
                
                if (!response.ok) {
                    throw new Error('无法读取 IP 文件');
                }
                
                const ip = (await response.text()).trim();
                
                if (!ip) {
                    throw new Error('IP 地址为空');
                }
                
                return ip;
            } catch (error) {
                console.error('读取 IP 失败:', error);
                throw error;
            }
        }
        
        // 使用 fetch 检测校园网（no-cors 模式）
        function detectCampusNetwork(ip) {
            return new Promise((resolve, reject) => {
                const timeout = CONFIG.timeout;
                
                const controller = new AbortController();
                const timeoutId = setTimeout(() => {
                    controller.abort();
                    console.log('[检测] 请求超时，判断为不在校园网');
                    resolve(false);
                }, timeout);
                
                // 使用 no-cors 模式，避免 CORS 限制
                fetch(`http://${ip}/ping.gif?t=${Date.now()}`, {
                    mode: 'no-cors',
                    cache: 'no-store',
                    signal: controller.signal
                })
                .then(() => {
                    clearTimeout(timeoutId);
                    console.log('[检测] 请求成功，确认在校园网');
                    resolve(true);
                })
                .catch((error) => {
                    clearTimeout(timeoutId);
                    console.log('[检测] 请求失败，判断为不在校园网:', error.message);
                    resolve(false);
                });
            });
        }
        
        // 跳转到系统
        function redirectToSystem(ip) {
            // 显示成功状态
            document.getElementById('success-ip').textContent = `http://${ip}`;
            showState('success');
            
            // 延迟跳转，让用户看到成功提示
            setTimeout(() => {
                // 使用 location.replace 并添加时间戳参数，避免浏览器缓存跳转
                window.location.replace(`http://${ip}?t=${Date.now()}`);
            }, 1500);
        }
        
        // 显示错误（人性化版本）
        function showError(message, detailedSteps = null) {
            const hintEl = document.getElementById('error-hint');
            hintEl.innerHTML = message;
            
            const stepsEl = document.getElementById('error-steps');
            if (detailedSteps) {
                stepsEl.innerHTML = detailedSteps;
                stepsEl.classList.remove('hidden');
            } else {
                // 默认详细步骤
                stepsEl.innerHTML = `
                    <ul style="list-style:none; padding-left:0;">
                        <li>📶 请连接校园网 WiFi（如：iSichuan、eduroam 等）</li>
                        <li>🔑 打开浏览器访问任意网页，完成校园网认证（输入学号/密码）</li>
                        <li>📱 请暂时关闭手机流量，仅使用校园网 WiFi</li>
                        <li>🔄 连接成功后点击下方“重新检测”按钮</li>
                        <li>❓ 若仍无法访问，请联系管理员确认内网服务器状态</li>
                    </ul>
                `;
                stepsEl.classList.remove('hidden');
            }
            showState('error');
        }
        
        // 主流程
        async function init() {
            try {
                // 步骤 1: 读取 IP
                const ip = await fetchIP();
                currentIP = ip;
                console.log('读取到 IP:', ip);
                
                // 步骤 2: 使用 Image 对象检测校园网环境
                const isInCampus = await detectCampusNetwork(ip);
                
                if (isInCampus) {
                    // 步骤 3a: 在校园网 → 跳转
                    redirectToSystem(ip);
                } else {
                    // 步骤 3b: 不在校园网 → 显示详细错误
                    showError(
                        '❌ 未检测到有效的校园网连接',
                        `
                        <ul style="list-style:none; padding-left:0;">
                            <li>📶 请确保已连接校园网 WiFi（lszjy）</li>
                            <li>🔑 打开浏览器访问任意网站（如 www.baidu.com），自动弹出认证页面后完成登录</li>
                            <li>📱 请暂时关闭手机移动数据（流量），只保留 WiFi 连接</li>
                            <li>🔄 完成上述步骤后，点击下方“重新检测”按钮</li>
                        </ul>
                        `
                    );
                }
                
            } catch (error) {
                // 读取 IP 失败时显示错误
                console.error('检测失败:', error);
                
                let errorMessage = '❌ 系统配置加载失败';
                let detailedSteps = '';
                
                if (error.message.includes('IP 地址为空')) {
                    errorMessage = '❌ 服务器地址配置缺失';
                    detailedSteps = `
                        <ul style="list-style:none; padding-left:0;">
                            <li>⏳ 可能是管理员正在更新配置，请稍后重试</li>
                            <li>📞 若长时间无法解决，请联系管理员</li>
                        </ul>
                    `;
                } else if (error.message.includes('无法读取 IP 文件')) {
                    errorMessage = '❌ 无法获取服务器地址';
                    detailedSteps = `
                        <ul style="list-style:none; padding-left:0;">
                            <li>🌐 请检查你的网络连接是否正常</li>
                            <li>🔄 尝试刷新页面或点击下方“重新检测”</li>
                            <li>📞 如问题持续，请联系技术支持</li>
                        </ul>
                    `;
                } else {
                    errorMessage = '❌ 网络环境检测失败';
                    detailedSteps = `
                        <ul style="list-style:none; padding-left:0;">
                            <li>📶 请确认已连接校园网 WiFi 并完成认证</li>
                            <li>📱 关闭手机流量，仅使用 WiFi</li>
                            <li>🔄 点击下方按钮重试</li>
                        </ul>
                    `;
                }
                
                showError(errorMessage, detailedSteps);
            }
        }
        
        // 重试
        function retry() {
            showState('loading');
            // 重置提示文字
            document.querySelector('#loading-state .message').textContent = '正在检测网络环境...';
            document.querySelector('#loading-state .hint').textContent = '请稍候，正在尝试连接校园网验证服务器';
            init();
        }
        
        // 页面加载时执行
        document.addEventListener('DOMContentLoaded', function() {
            init();
        });
        
        // 防止浏览器后退
        history.pushState(null, null, location.href);
        window.onpopstate = function() {
            history.pushState(null, null, location.href);
        };
    </script>
</body>
</html>
