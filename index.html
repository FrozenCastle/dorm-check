<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正在跳转 - 智慧校园查寝系统</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; color: #fff; overflow: hidden; }
        body::before { content: ''; position: absolute; width: 200%; height: 200%; background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px); background-size: 50px 50px; animation: backgroundMove 20s linear infinite; z-index: -1; }
        @keyframes backgroundMove { 0% { transform: translate(0, 0); } 100% { transform: translate(50px, 50px); } }
        .container { text-align: center; padding: 40px; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border-radius: 20px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2); border: 1px solid rgba(255, 255, 255, 0.2); max-width: 400px; width: 90%; animation: containerFadeIn 0.8s ease-out; }
        @keyframes containerFadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .spinner { width: 60px; height: 60px; margin: 0 auto 25px; border: 4px solid rgba(255, 255, 255, 0.2); border-top-color: #fff; border-radius: 50%; animation: spin 1s linear infinite; position: relative; }
        .spinner::before { content: ''; position: absolute; top: 5px; left: 5px; right: 5px; bottom: 5px; border: 3px solid rgba(255, 255, 255, 0.3); border-top-color: transparent; border-radius: 50%; animation: spin 2s linear infinite reverse; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .message { font-size: 22px; font-weight: 600; margin-bottom: 12px; text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2); animation: textFadeIn 0.6s ease-out 0.2s both; }
        @keyframes textFadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .hint { font-size: 14px; opacity: 0.85; line-height: 1.6; animation: textFadeIn 0.6s ease-out 0.4s both; }
        .ip-display { margin-top: 20px; padding: 12px; background: rgba(255, 255, 255, 0.15); border-radius: 10px; font-family: 'Courier New', monospace; font-size: 13px; animation: textFadeIn 0.6s ease-out 0.6s both; }
        .ip-label { font-size: 12px; opacity: 0.8; margin-bottom: 5px; }
        .ip-value { font-weight: bold; font-size: 15px; }
        .retry-btn { margin-top: 25px; padding: 12px 35px; background: #fff; color: #667eea; border: none; border-radius: 25px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2); animation: buttonFadeIn 0.6s ease-out 0.8s both; outline: none; }
        .retry-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3); }
        .retry-btn:active { transform: translateY(0); }
        @keyframes buttonFadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .error-icon { font-size: 50px; margin-bottom: 20px; animation: shake 0.6s ease-out; display: block; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 15% { transform: translateX(-15px); } 30% { transform: translateX(15px); } 45% { transform: translateX(-15px); } 60% { transform: translateX(15px); } 75% { transform: translateX(-10px); } }
        .success-icon { font-size: 50px; margin-bottom: 20px; animation: bounce 0.8s ease-out; display: block; }
        @keyframes bounce { 0%, 100% { transform: scale(0); } 50% { transform: scale(1.2); } 70% { transform: scale(0.9); } 85% { transform: scale(1.1); } }
        .progress-bar { width: 100%; height: 4px; background: rgba(255, 255, 255, 0.2); border-radius: 2px; margin-top: 20px; overflow: hidden; animation: fadeIn 0.6s ease-out 0.5s both; }
        .progress-bar::after { content: ''; display: block; width: 50%; height: 100%; background: #fff; animation: progress 1.5s ease-in-out infinite; }
        @keyframes progress { 0% { transform: translateX(-100%); } 100% { transform: translateX(200%); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .hidden { display: none !important; }
        @media (max-width: 480px) { .container { padding: 30px 20px; } .message { font-size: 18px; } .hint { font-size: 13px; } .spinner { width: 50px; height: 50px; } }
        .error-steps { text-align: left; background: rgba(0,0,0,0.2); border-radius: 12px; padding: 12px 16px; margin-top: 12px; font-size: 12px; }
        .error-steps li { margin: 8px 0; list-style: none; display: flex; align-items: center; gap: 8px; }
        .error-steps li::before { content: "•"; font-size: 16px; font-weight: bold; }
        .ip-info-box { margin-top: 15px; padding: 12px; background: rgba(255,255,255,0.1); border-radius: 8px; font-size: 12px; text-align: left; }
        .ip-info-row { display: flex; justify-content: space-between; margin: 6px 0; }
        .ip-info-label { opacity: 0.8; }
        .ip-info-value { font-weight: bold; font-family: 'Courier New', monospace; }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div id="loading-state">
            <div class="spinner"></div>
            <div class="message">正在检测网络环境...</div>
            <div class="hint">请稍候，正在验证校园网连接</div>
            <div class="progress-bar"></div>
            <div style="margin-top: 15px; font-size: 11px; opacity: 0.6;">版本：v4.2 | 支持域名跳转</div>
        </div>
        <div id="success-state" class="hidden">
            <div class="success-icon">✅</div>
            <div class="message">检测成功！</div>
            <div class="hint">正在跳转到查寝系统...</div>
            <div class="ip-display"><div class="ip-label">系统地址</div><div class="ip-value" id="success-ip">--</div></div>
        </div>
        <div id="error-state" class="hidden">
            <div class="error-icon">⚠️</div>
            <div class="message">无法访问系统</div>
            <div class="hint" id="error-hint">未检测到校园网连接</div>
            <div class="ip-info-box" id="ip-info-box">
                <div class="ip-info-row">
                    <span class="ip-info-label">您的公网 IP:</span>
                    <span class="ip-info-value" id="public-ip-display">--</span>
                </div>
                <div class="ip-info-row">
                    <span class="ip-info-label">系统内网 IP:</span>
                    <span class="ip-info-value" id="system-ip-display">--</span>
                </div>
            </div>
            <div class="error-steps" id="error-steps"></div>
            <button class="retry-btn" onclick="retry()">重新检测</button>
        </div>
    </div>

    <script>
        // ==================== 配置区域 ====================
        // 校园网的公网 IP 段（CIDR 格式）
        // 根据你提供的 IP 39.191.196.63，这是中国移动的 IP
        // 建议使用 /16 或 /24 来匹配
        const SCHOOL_IP_RANGES = [
            "39.191.0.0/16",      // 中国移动 - 校园网主网段
            "39.191.196.0/24"     // 更精确的匹配（可选）
        ];

        // 检测超时（毫秒）
        const TIMEOUT = 5000;

        // 是否启用缓存破坏
        const CACHE_BUST = true;
        // =================================================

        let currentTargetIP = null;
        let currentPublicIP = null;

        function showState(state) {
            ['loading', 'success', 'error'].forEach(s => {
                const el = document.getElementById(`${s}-state`);
                if (el) el.classList.add('hidden');
            });
            document.getElementById(`${state}-state`).classList.remove('hidden');
        }

        // 读取动态内网 IP（由 git push 更新）
        async function fetchTargetIP() {
            try {
                const url = CACHE_BUST ? `current_ip.txt?t=${Date.now()}` : 'current_ip.txt';
                const response = await fetch(url, { cache: 'no-cache' });
                if (!response.ok) throw new Error('无法读取 IP 文件');
                const ip = (await response.text()).trim();
                if (!ip) throw new Error('IP 地址为空');
                if (!/^(\d{1,3}\.){3}\d{1,3}$/.test(ip)) throw new Error('IP 格式无效');
                return ip;
            } catch (error) {
                console.error('读取目标 IP 失败:', error);
                throw error;
            }
        }

        // 获取客户端公网 IP
        async function fetchPublicIP() {
            const controllers = [];
            const timeoutId = setTimeout(() => {
                controllers.forEach(c => c.abort());
            }, TIMEOUT);

            const services = [
                'https://api.ip.sb/ip',
                'https://api.ipify.org',
                'https://icanhazip.com',
                'https://ifconfig.me/ip'
            ];

            for (const url of services) {
                try {
                    const controller = new AbortController();
                    controllers.push(controller);
                    const response = await fetch(url, { signal: controller.signal });
                    if (response.ok) {
                        let ip = (await response.text()).trim();
                        ip = ip.replace(/\s/g, '');
                        if (/^(\d{1,3}\.){3}\d{1,3}$/.test(ip)) {
                            clearTimeout(timeoutId);
                            return ip;
                        }
                    }
                } catch (e) {
                    console.warn(`IP 服务 ${url} 失败:`, e);
                }
            }
            clearTimeout(timeoutId);
            throw new Error('无法获取公网 IP');
        }

        // 判断 IP 是否在指定的 CIDR 范围内
        function ipInCIDR(ip, cidr) {
            const [network, prefixLen] = cidr.split('/');
            const prefix = parseInt(prefixLen, 10);
            if (isNaN(prefix)) return false;

            const ipParts = ip.split('.').map(Number);
            const netParts = network.split('.').map(Number);
            if (ipParts.length !== 4 || netParts.length !== 4) return false;

            let ipInt = 0, netInt = 0;
            for (let i = 0; i < 4; i++) {
                ipInt = (ipInt << 8) | ipParts[i];
                netInt = (netInt << 8) | netParts[i];
            }
            const mask = ~((1 << (32 - prefix)) - 1);
            return (ipInt & mask) === (netInt & mask);
        }

        // 判断公网 IP 是否属于学校
        function isSchoolIP(publicIP) {
            for (const cidr of SCHOOL_IP_RANGES) {
                if (ipInCIDR(publicIP, cidr)) {
                    console.log(`[检测] IP ${publicIP} 匹配学校网段 ${cidr}`);
                    return true;
                }
            }
            console.log(`[检测] IP ${publicIP} 不在任何学校网段内`);
            return false;
        }

        // 跳转到系统域名
        function redirectToSystem(ip) {
            const domain = 'https://dorm-check.ccwu.cc';
            document.getElementById('success-ip').textContent = domain;
            showState('success');
            setTimeout(() => {
                window.location.replace(`${domain}?t=${Date.now()}`);
            }, 1500);
        }

        // 显示错误（带详细步骤和 IP 信息）
        function showError(message, publicIP, targetIP, detailedStepsHtml = null) {
            document.getElementById('error-hint').innerHTML = message;
            
            // 显示 IP 信息
            if (publicIP) {
                document.getElementById('public-ip-display').textContent = publicIP;
            } else {
                document.getElementById('public-ip-display').textContent = '获取失败';
            }
            
            if (targetIP) {
                document.getElementById('system-ip-display').textContent = targetIP;
            } else {
                document.getElementById('system-ip-display').textContent = '获取失败';
            }
            
            document.getElementById('ip-info-box').classList.remove('hidden');
            
            const stepsDiv = document.getElementById('error-steps');
            if (detailedStepsHtml) {
                stepsDiv.innerHTML = detailedStepsHtml;
                stepsDiv.classList.remove('hidden');
            } else {
                stepsDiv.classList.add('hidden');
            }
            showState('error');
        }

        // 主流程
        async function init() {
            try {
                // 步骤 1：获取目标内网 IP
                const targetIP = await fetchTargetIP();
                currentTargetIP = targetIP;
                console.log('目标内网 IP:', targetIP);

                // 步骤 2：检查当前页面协议
                const isHttps = window.location.protocol === 'https:';
                console.log('当前协议:', window.location.protocol);

                if (isHttps) {
                    // HTTPS 页面：使用 HTTPS 访问系统
                    const systemUrl = `https://${targetIP}:15000`;
                    const pingUrl = `${systemUrl}/ping.gif`;
                    console.log('尝试访问系统 (HTTPS):', systemUrl);

                    try {
                        // 尝试访问 ping.gif 端点
                        const response = await fetch(pingUrl, {
                            signal: AbortSignal.timeout(TIMEOUT),
                            mode: 'cors',
                            credentials: 'omit'
                        });

                        if (response.ok) {
                            // 访问成功，说明在校园网内
                            console.log('✅ 成功访问系统，在校园网内');
                            redirectToSystem(targetIP);
                        } else {
                            // 访问失败（HTTP 错误）
                            throw new Error(`HTTP 错误: ${response.status}`);
                        }
                    } catch (error) {
                        console.log('❌ 无法访问系统:', error.message);
                        
                        // 尝试获取公网 IP 用于错误信息
                        let publicIP = null;
                        try {
                            publicIP = await fetchPublicIP();
                            currentPublicIP = publicIP;
                        } catch (e) {
                            console.warn('无法获取公网 IP:', e);
                        }

                        // 显示错误信息
                        showError(
                            '❌ 未检测到校园网连接',
                            publicIP,
                            targetIP,
                            `
                            <ul>
                                <li>📶 无法连接到系统 (${targetIP}:15000)</li>
                                <li>📡 请连接校园网 WiFi（如：iSichuan、eduroam、CMCC-EDU 等）</li>
                                <li>🔑 打开浏览器访问任意网站，完成校园网认证（输入学号/密码）</li>
                                <li>📱 请暂时关闭手机移动数据（流量），只保留 WiFi 连接</li>
                                <li>🔄 完成上述步骤后，点击下方"重新检测"按钮</li>
                                <li>💡 提示：部分校园网需要每天重新认证一次</li>
                            </ul>
                            `
                        );
                    }
                } else {
                    // HTTP 页面：使用 HTTP 访问系统
                    const systemUrl = `http://${targetIP}:15000`;
                    const pingUrl = `${systemUrl}/ping.gif`;
                    console.log('尝试访问系统 (HTTP):', systemUrl);

                    try {
                        // 尝试访问 ping.gif 端点
                        const response = await fetch(pingUrl, {
                            signal: AbortSignal.timeout(TIMEOUT),
                            mode: 'cors',
                            credentials: 'omit'
                        });

                        if (response.ok) {
                            // 访问成功，说明在校园网内
                            console.log('✅ 成功访问系统，在校园网内');
                            redirectToSystem(targetIP);
                        } else {
                            // 访问失败（HTTP 错误）
                            throw new Error(`HTTP 错误: ${response.status}`);
                        }
                    } catch (error) {
                        console.log('❌ 无法访问系统:', error.message);
                        
                        // 尝试获取公网 IP 用于错误信息
                        let publicIP = null;
                        try {
                            publicIP = await fetchPublicIP();
                            currentPublicIP = publicIP;
                        } catch (e) {
                            console.warn('无法获取公网 IP:', e);
                        }

                        // 显示错误信息
                        showError(
                            '❌ 未检测到校园网连接',
                            publicIP,
                            targetIP,
                            `
                            <ul>
                                <li>📶 无法连接到系统 (${targetIP}:15000)</li>
                                <li>📡 请连接校园网 WiFi（如：iSichuan、eduroam、CMCC-EDU 等）</li>
                                <li>🔑 打开浏览器访问任意网站，完成校园网认证（输入学号/密码）</li>
                                <li>📱 请暂时关闭手机移动数据（流量），只保留 WiFi 连接</li>
                                <li>🔄 完成上述步骤后，点击下方"重新检测"按钮</li>
                                <li>💡 提示：部分校园网需要每天重新认证一次</li>
                            </ul>
                            `
                        );
                    }
                }
            } catch (error) {
                console.error('检测流程失败:', error);
                let errMsg = '❌ 网络检测失败';
                let steps = '';
                if (error.message.includes('无法读取 IP 文件')) {
                    errMsg = '❌ 无法获取系统地址';
                    steps = '<ul><li>🌐 请检查网络连接后刷新重试</li><li>📞 若问题持续，请联系管理员</li></ul>';
                } else {
                    errMsg = '❌ 检测过程中出现错误';
                    steps = '<ul><li>🔄 请刷新页面重试</li><li>📞 若多次失败，请联系技术支持</li></ul>';
                }
                showError(errMsg, currentPublicIP, currentTargetIP, steps);
            }
        }

        function retry() {
            showState('loading');
            const msgEl = document.querySelector('#loading-state .message');
            const hintEl = document.querySelector('#loading-state .hint');
            if (msgEl) msgEl.textContent = '正在检测网络环境...';
            if (hintEl) hintEl.textContent = '请稍候，正在验证校园网连接';
            document.getElementById('ip-info-box').classList.add('hidden');
            init();
        }

        document.addEventListener('DOMContentLoaded', init);
        history.pushState(null, null, location.href);
        window.onpopstate = function() { history.pushState(null, null, location.href); };
    </script>
</body>
</html>
